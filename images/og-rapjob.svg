<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bgGrad" cx="30%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a0808"/>
      <stop offset="100%" stop-color="#050505"/>
    </radialGradient>
    <radialGradient id="reelGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </radialGradient>
    <radialGradient id="glowRed" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#dc2626" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#dc2626" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#ffffff" stroke-width="0.5" opacity="0.04"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#ffffff" stroke-width="0.5" opacity="0.04"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#ffffff" stroke-width="0.5" opacity="0.04"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#ffffff" stroke-width="0.5" opacity="0.04"/>

  <!-- Red glow blob left -->
  <ellipse cx="200" cy="315" rx="300" ry="250" fill="url(#glowRed)" opacity="0.6"/>

  <!-- Film strip top -->
  <rect x="0" y="0" width="1200" height="60" fill="#0f0f0f"/>
  <rect x="0" y="55" width="1200" height="5" fill="#dc2626" opacity="0.7"/>
  <!-- Sprocket holes top strip -->
  <rect x="30" y="10" width="30" height="40" rx="4" fill="#1a1a1a"/>
  <rect x="100" y="10" width="30" height="40" rx="4" fill="#1a1a1a"/>
  <rect x="170" y="10" width="30" height="40" rx="4" fill="#1a1a1a"/>
  <rect x="240" y="10" width="30" height="40" rx="4" fill="#1a1a1a"/>
  <rect x="310" y="10" width="30" height="40" rx="4" fill="#1a1a1a"/>
  <rect x="380" y="10" width="30" height="40" rx="4" fill="#1a1a1a"/>
  <rect x="450" y="10" width="30" height="40" rx="4" fill="#1a1a1a"/>
  <rect x="520" y="10" width="30" height="40" rx="4" fill="#1a1a1a"/>
  <rect x="590" y="10" width="30" height="40" rx="4" fill="#1a1a1a"/>
  <rect x="660" y="10" width="30" height="40" rx="4" fill="#1a1a1a"/>
  <rect x="730" y="10" width="30" height="40" rx="4" fill="#1a1a1a"/>
  <rect x="800" y="10" width="30" height="40" rx="4" fill="#1a1a1a"/>
  <rect x="870" y="10" width="30" height="40" rx="4" fill="#1a1a1a"/>
  <rect x="940" y="10" width="30" height="40" rx="4" fill="#1a1a1a"/>
  <rect x="1010" y="10" width="30" height="40" rx="4" fill="#1a1a1a"/>
  <rect x="1080" y="10" width="30" height="40" rx="4" fill="#1a1a1a"/>
  <rect x="1150" y="10" width="30" height="40" rx="4" fill="#1a1a1a"/>

  <!-- Film strip bottom -->
  <rect x="0" y="570" width="1200" height="60" fill="#0f0f0f"/>
  <rect x="0" y="570" width="1200" height="5" fill="#dc2626" opacity="0.7"/>
  <rect x="30" y="580" width="30" height="40" rx="4" fill="#1a1a1a"/>
  <rect x="100" y="580" width="30" height="40" rx="4" fill="#1a1a1a"/>
  <rect x="170" y="580" width="30" height="40" rx="4" fill="#1a1a1a"/>
  <rect x="240" y="580" width="30" height="40" rx="4" fill="#1a1a1a"/>
  <rect x="310" y="580" width="30" height="40" rx="4" fill="#1a1a1a"/>
  <rect x="380" y="580" width="30" height="40" rx="4" fill="#1a1a1a"/>
  <rect x="450" y="580" width="30" height="40" rx="4" fill="#1a1a1a"/>
  <rect x="520" y="580" width="30" height="40" rx="4" fill="#1a1a1a"/>
  <rect x="590" y="580" width="30" height="40" rx="4" fill="#1a1a1a"/>
  <rect x="660" y="580" width="30" height="40" rx="4" fill="#1a1a1a"/>
  <rect x="730" y="580" width="30" height="40" rx="4" fill="#1a1a1a"/>
  <rect x="800" y="580" width="30" height="40" rx="4" fill="#1a1a1a"/>
  <rect x="870" y="580" width="30" height="40" rx="4" fill="#1a1a1a"/>
  <rect x="940" y="580" width="30" height="40" rx="4" fill="#1a1a1a"/>
  <rect x="1010" y="580" width="30" height="40" rx="4" fill="#1a1a1a"/>
  <rect x="1080" y="580" width="30" height="40" rx="4" fill="#1a1a1a"/>
  <rect x="1150" y="580" width="30" height="40" rx="4" fill="#1a1a1a"/>

  <!-- Large Film Reel (left side) -->
  <circle cx="270" cy="315" r="200" fill="#120404" stroke="#dc2626" stroke-width="3" opacity="0.9"/>
  <circle cx="270" cy="315" r="190" fill="url(#reelGrad)" opacity="0.15"/>
  <!-- Reel spokes -->
  <line x1="270" y1="315" x2="270" y2="135" stroke="#dc2626" stroke-width="6" opacity="0.5"/>
  <line x1="270" y1="315" x2="436" y2="411" stroke="#dc2626" stroke-width="6" opacity="0.5"/>
  <line x1="270" y1="315" x2="104" y2="411" stroke="#dc2626" stroke-width="6" opacity="0.5"/>
  <!-- Reel holes outer ring -->
  <circle cx="270" cy="135" r="18" fill="#0a0a0a" stroke="#dc2626" stroke-width="2"/>
  <circle cx="436" cy="411" r="18" fill="#0a0a0a" stroke="#dc2626" stroke-width="2"/>
  <circle cx="104" cy="411" r="18" fill="#0a0a0a" stroke="#dc2626" stroke-width="2"/>
  <circle cx="436" cy="219" r="18" fill="#0a0a0a" stroke="#dc2626" stroke-width="2"/>
  <circle cx="104" cy="219" r="18" fill="#0a0a0a" stroke="#dc2626" stroke-width="2"/>
  <circle cx="270" cy="495" r="18" fill="#0a0a0a" stroke="#dc2626" stroke-width="2"/>
  <!-- Hub -->
  <circle cx="270" cy="315" r="55" fill="#0a0a0a" stroke="#dc2626" stroke-width="3"/>
  <circle cx="270" cy="315" r="18" fill="#dc2626" filter="url(#glow)"/>
  <circle cx="270" cy="315" r="8" fill="#ffffff" opacity="0.8"/>
  <!-- Outer ring detail -->
  <circle cx="270" cy="315" r="195" fill="none" stroke="#dc2626" stroke-width="1" stroke-dasharray="12 8" opacity="0.3"/>

  <!-- Right side: Text content -->
  <!-- Badge top -->
  <rect x="560" y="115" width="260" height="34" rx="17" fill="#dc2626" opacity="0.15" stroke="#dc2626" stroke-width="1.5" opacity="0.5"/>
  <text x="690" y="138" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="14" fill="#ef4444" letter-spacing="4">HỆ THỐNG KIẾM TIỀN</text>

  <!-- Main title RẠP -->
  <text x="560" y="240" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="130" fill="#ffffff" letter-spacing="-4" filter="url(#softGlow)">RẠP</text>
  <!-- Main title JOB in red -->
  <text x="560" y="370" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="130" fill="#dc2626" letter-spacing="-4" filter="url(#glow)">JOB</text>

  <!-- Separator line -->
  <rect x="560" y="390" width="580" height="4" rx="2" fill="url(#reelGrad)" opacity="0.7"/>

  <!-- Tagline -->
  <text x="560" y="435" font-family="Arial, sans-serif" font-weight="700" font-size="22" fill="#94a3b8" letter-spacing="6">FREELANCE  •  CINEMA  •  EARN</text>

  <!-- Stats row -->
  <rect x="560" y="460" width="140" height="70" rx="12" fill="#dc2626" opacity="0.12" stroke="#dc2626" stroke-width="1"/>
  <text x="630" y="492" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="26" fill="#ef4444">10K+</text>
  <text x="630" y="515" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b" letter-spacing="1">THÀNH VIÊN</text>

  <rect x="720" y="460" width="140" height="70" rx="12" fill="#dc2626" opacity="0.12" stroke="#dc2626" stroke-width="1"/>
  <text x="790" y="492" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="26" fill="#ef4444">24/7</text>
  <text x="790" y="515" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b" letter-spacing="1">RÚT TIỀN</text>

  <rect x="880" y="460" width="170" height="70" rx="12" fill="#dc2626" opacity="0.12" stroke="#dc2626" stroke-width="1"/>
  <text x="965" y="492" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="26" fill="#ef4444">500K</text>
  <text x="965" y="515" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b" letter-spacing="1">THU NHẬP/NGÀY</text>

  <!-- Domain -->
  <text x="1140" y="558" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#dc2626" opacity="0.6" letter-spacing="2">rapjob.io</text>
</svg>
